<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karma Manager — Shared Anagram</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f7;
            color: #1d1d1f;
        }
        .card {
            background: white;
            border-radius: 18px;
            padding: 40px 48px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            max-width: 480px;
            width: 90%;
            text-align: center;
        }
        h1 { font-size: 1.1rem; color: #6e6e73; font-weight: 500; margin-bottom: 24px; }
        .phrase {
            font-size: 1.6rem;
            font-weight: 600;
            margin: 12px 0;
            letter-spacing: -0.5px;
        }
        .arrow { font-size: 1.4rem; color: #6e6e73; margin: 8px 0; }
        .badge {
            display: inline-block;
            margin-top: 28px;
            font-size: 0.8rem;
            color: #aeaeb2;
        }
        a { color: #0071e3; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Shared Anagram</h1>
        <div class="phrase">{{.Input}}</div>
        <div class="arrow">↔</div>
        <div class="phrase">{{.Anagram}}</div>
        <div class="badge">
            Shared via <a href="https://apps.apple.com/app/karma-manager/id6736835618">Karma Manager</a>
        </div>
    </div>
</body>
</html>
